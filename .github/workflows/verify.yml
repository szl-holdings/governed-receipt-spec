name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run the offline verifier on the real examples
        run: python verify.py examples/*.json
      - name: Run the unittest suite (stdlib only)
        run: python -m unittest discover -s tests -v
